<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zylora — Offline</title>
    <style>
      html,body{height:100%;margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0D1B2A;color:#fff;display:flex}
      .box{margin:auto;text-align:center;padding:24px;max-width:320px}
      .dot{width:10px;height:10px;border-radius:50%;background:#0EA472;display:inline-block;margin-right:6px}
      h1{font-size:18px;margin:16px 0 8px}p{color:#9fb3c8;font-size:14px;line-height:1.5}
      button{margin-top:18px;padding:10px 18px;border:0;border-radius:10px;background:#1B3D72;color:#fff;font-weight:600;font-size:14px}
    </style>
  </head>
  <body>
    <div class="box">
      <div><span class="dot"></span>Zylora Absensi</div>
      <h1>Sedang offline</h1>
      <p>Tidak ada koneksi internet. Periksa jaringan Anda lalu coba lagi untuk memuat data presensi terbaru.</p>
      <button onclick="location.reload()">Coba lagi</button>
    </div>
  </body>
</html>
