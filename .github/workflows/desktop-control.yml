name: Build Desktop Installer — Sistem Kontrol

# Membungkus frontend "Sistem Kontrol" jadi installer desktop via Electron.
# - push ke main → hanya ubuntu (validasi pipeline murah)
# - manual (Run workflow) → Windows .exe + macOS .dmg + Linux .AppImage/.deb

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...)"
        required: false
        default: "https://api.13-218-74-178.sslip.io"

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://api.13-218-74-178.sslip.io' }}

# Hak token minimal (hanya baca repo). Job ini memegang secret code-signing + menjalankan
# electron-builder (tooling pihak ketiga); batasi token agar dependency yang terkompromi
# tak bisa menulis ke repo. Naikkan per-job hanya bila benar-benar perlu.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Hemat menit CI: push → ubuntu saja (validasi). Untuk installer lengkap
        # (Windows .exe + macOS .dmg + Linux), pakai "Run workflow" (dispatch) → matrix penuh.
        os: ${{ (github.event_name == 'push') && fromJSON('["windows-latest","ubuntu-latest"]') || fromJSON('["windows-latest","macos-latest","ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build web (Sistem Kontrol, base relatif untuk file://)
        shell: bash
        env:
          # Kode versi monoton untuk cek update OTA (sejajar dgn APK).
          VITE_VERSION_CODE: ${{ github.run_number }}
        run: |
          # Root = proyek pnpm (pnpm-lock.yaml ter-commit). Untuk build root yang BENAR-BENAR
          # reproducible, ganti dua baris di bawah dengan `corepack enable && pnpm install
          # --frozen-lockfile` (react/react-dom adalah dependency langsung di lock → ikut ter-
          # install). Belum diubah di sini karena perlu diuji di CI dulu. Lihat docs/AUDIT-2026-06-28.md.
          npm install --no-audit --no-fund --legacy-peer-deps
          npm install --no-audit --no-fund react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\nVITE_VERSION_CODE=%s\n' "$API_URL" "$VITE_VERSION_CODE" > .env.production.local
          # VITE_API_URL diteruskan ke env PROSES (bukan cuma file .env) agar guard
          # apiUrlGuard melihatnya; VITE_REQUIRE_API_URL=1 → build GAGAL bila kosong
          # (cegah diam-diam menunjuk fallback produksi saat input dispatch dikosongkan).
          VITE_API_URL="$API_URL" VITE_REQUIRE_API_URL=1 VITE_ROLE=control \
            npx vite build --base ./ --outDir desktop-app/www --emptyOutDir

      - name: Build installer (electron-builder)
        working-directory: desktop-app
        shell: bash
        env:
          # Code-signing Windows OTOMATIS bila kedua secret ini di-set di repo
          # (Settings → Secrets → Actions). Kosong = build unsigned (default).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Reproducible: butuh desktop-app/package-lock.json TER-COMMIT. Generate sekali
          # di mesin ber-network: (cd desktop-app && npm install) lalu commit lock-nya.
          # electron/electron-builder sudah dipin exact di desktop-app/package.json. Lihat docs/AUDIT-2026-06-28.md.
          npm ci --no-audit --no-fund
          npx electron-builder --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: zylora-kontrol-${{ matrix.os }}
          path: |
            desktop-app/dist-installers/*.exe
            desktop-app/dist-installers/*.dmg
            desktop-app/dist-installers/*.AppImage
            desktop-app/dist-installers/*.deb
          if-no-files-found: warn

# Catatan: Windows tak ditandatangani (SmartScreen). Untuk produksi tambah
# code-signing (CSC_LINK/CSC_KEY_PASSWORD). appId = id.zylora.kontrol.
