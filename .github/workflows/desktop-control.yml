name: Build Desktop Installer — Sistem Kontrol

# Membungkus frontend "Sistem Kontrol" jadi installer desktop lintas-OS
# (Windows .exe/NSIS, macOS .dmg, Linux .AppImage/.deb) via Electron + electron-builder.
# Build per-OS di runner masing-masing (matrix). Trigger manual.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...) yang dipanggil panel kontrol"
        required: true
        default: "https://api.example.com"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web (Sistem Kontrol, base relatif untuk file://)
        shell: bash
        run: |
          corepack enable
          pnpm install --no-frozen-lockfile
          pnpm add -D react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\n' "${{ github.event.inputs.api_url }}" > .env.production.local
          VITE_ROLE=control pnpm exec vite build --base ./ --outDir desktop-app/www --emptyOutDir

      - name: Build installer (electron-builder)
        working-directory: desktop-app
        shell: bash
        run: |
          npm install
          npx electron-builder --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: zylora-kontrol-${{ matrix.os }}
          path: |
            desktop-app/dist-installers/*.exe
            desktop-app/dist-installers/*.dmg
            desktop-app/dist-installers/*.AppImage
            desktop-app/dist-installers/*.deb
          if-no-files-found: warn

# Catatan:
#  • Web dibangun dengan `--base ./` agar aset termuat via file:// di Electron.
#  • Installer Windows tidak ditandatangani (SmartScreen mungkin memperingatkan);
#    untuk produksi tambahkan sertifikat code-signing (CSC_LINK/CSC_KEY_PASSWORD).
#  • appId = id.zylora.kontrol (lihat desktop-app/package.json).
