name: Build Desktop Installer — Sistem Kontrol

# Membungkus frontend "Sistem Kontrol" jadi installer desktop via Electron.
# - push ke main → hanya ubuntu (validasi pipeline murah)
# - manual (Run workflow) → Windows .exe + macOS .dmg + Linux .AppImage/.deb

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...)"
        required: false
        default: "https://api.13-218-74-178.sslip.io"

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://api.13-218-74-178.sslip.io' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Penuh: Windows .exe + macOS .dmg + Linux .AppImage/.deb.
        # (Untuk hemat menit CI, bisa dibatasi ke ubuntu-latest saja.)
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web (Sistem Kontrol, base relatif untuk file://)
        shell: bash
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm install --no-audit --no-fund react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\n' "$API_URL" > .env.production.local
          VITE_ROLE=control npx vite build --base ./ --outDir desktop-app/www --emptyOutDir

      - name: Build installer (electron-builder)
        working-directory: desktop-app
        shell: bash
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: zylora-kontrol-${{ matrix.os }}
          path: |
            desktop-app/dist-installers/*.exe
            desktop-app/dist-installers/*.dmg
            desktop-app/dist-installers/*.AppImage
            desktop-app/dist-installers/*.deb
          if-no-files-found: warn

# Catatan: Windows tak ditandatangani (SmartScreen). Untuk produksi tambah
# code-signing (CSC_LINK/CSC_KEY_PASSWORD). appId = id.zylora.kontrol.
