name: Build Android APK (Zylora)

# Membungkus frontend Zylora (PWA) jadi APK Android via Capacitor.
# Jalan saat push ke main (otomatis) ATAU manual (Actions → Run workflow).
# Mesin lokal tak punya Android SDK/Gradle modern; build dijalankan di CI ini.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...)"
        required: false
        default: "https://api.13-218-74-178.sslip.io"
      role:
        description: "Frontend yang dibungkus: employee | display (Sistem Kontrol KHUSUS desktop, bukan APK)"
        required: false
        default: "employee"

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://api.13-218-74-178.sslip.io' }}
  ROLE: ${{ github.event.inputs.role || 'employee' }}

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Validasi role (Sistem Kontrol bukan APK)
        run: |
          if [ "$ROLE" = "control" ]; then
            echo "::error::role 'control' = Sistem Kontrol KHUSUS desktop (Electron), bukan APK. Pakai workflow Desktop. Role APK: employee | display."
            exit 1
          fi

      - name: Build web (frontend ${{ env.ROLE }})
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm install --no-audit --no-fund react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\n' "$API_URL" > .env.production.local
          # Wajibkan API URL: APK yang menunjuk loopback tak berguna di perangkat.
          VITE_API_URL="$API_URL" VITE_REQUIRE_API_URL=1 VITE_ROLE="$ROLE" \
            npx vite build --outDir "dist-$ROLE" --emptyOutDir

      - name: Wrap with Capacitor
        working-directory: android-app
        run: |
          rm -rf www && mkdir -p www
          cp -r "../dist-$ROLE/." www/
          npm install --no-audit --no-fund
          npx cap add android || true
          npx cap sync android
          # Izin kamera + lokasi (scan QR & GPS butuh ini di WebView).
          node inject-permissions.mjs
          # Konfigurasi release signing (pakai keystore bila secret di-set, selain itu debug).
          node inject-signing.mjs

      - name: Bump app version (tiap APK = update, bukan reinstall yang ditolak)
        working-directory: android-app/android
        run: |
          # android/ di-regenerate tiap build → build.gradle selalu lahir
          # versionCode 1 / versionName "1.0". Naikkan dari run_number agar
          # Android menganggap APK baru sebagai pembaruan & membuang app lama.
          VC="${{ github.run_number }}"
          sed -i -E "s/versionCode [0-9]+/versionCode ${VC}/" app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"1.0.${VC}\"/" app/build.gradle
          grep -E "versionCode|versionName" app/build.gradle

      - name: Build APK + AAB (release; ber-tanda-tangan bila keystore di-set)
        working-directory: android-app/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ZYLORA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ZYLORA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ZYLORA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/zylora.keystore"
            export ZYLORA_KEYSTORE="$RUNNER_TEMP/zylora.keystore"
            echo "→ RELEASE-signed (keystore produksi dari secret) + AAB"
            ./gradlew clean assembleRelease bundleRelease --no-daemon
          else
            echo "→ debug-signed (belum ada secret keystore); set ANDROID_KEYSTORE_BASE64 dll untuk rilis Play Store"
            ./gradlew clean assembleRelease --no-daemon
          fi

      - name: Upload APK + AAB
        uses: actions/upload-artifact@v7
        with:
          name: zylora-${{ env.ROLE }}-apk
          path: |
            android-app/android/app/build/outputs/apk/release/*.apk
            android-app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

# Catatan: build assembleRelease. RELEASE-signed bila secret keystore di-set
# (ANDROID_KEYSTORE_BASE64/_PASSWORD, ANDROID_KEY_ALIAS/_PASSWORD) → APK + .aab
# Play Store; selain itu debug-signed (sideload). Lihat android-app/README.md.
