name: Build Android APK (Zylora)

# Membungkus frontend Zylora (PWA) jadi APK Android via Capacitor.
# Trigger manual: Actions → "Build Android APK (Zylora)" → Run workflow.
# Mesin lokal tidak punya Android SDK/Gradle modern; build dijalankan di CI ini.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...) yang dipanggil app"
        required: true
        default: "https://api.example.com"
      role:
        description: "Frontend yang dibungkus: employee | control"
        required: true
        default: "employee"

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web (frontend ${{ github.event.inputs.role }})
        run: |
          corepack enable
          pnpm install --no-frozen-lockfile
          pnpm add -D react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\n' "${{ github.event.inputs.api_url }}" > .env.production.local
          VITE_ROLE=${{ github.event.inputs.role }} pnpm exec vite build \
            --outDir "dist-${{ github.event.inputs.role }}" --emptyOutDir

      - name: Wrap with Capacitor
        working-directory: android-app
        run: |
          rm -rf www && mkdir -p www
          cp -r "../dist-${{ github.event.inputs.role }}/." www/
          npm install
          npx cap add android || true
          npx cap sync android

      - name: Build APK (debug)
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zylora-${{ github.event.inputs.role }}-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

# Catatan:
#  • Ini menghasilkan APK *debug* (bisa di-sideload utk uji). Untuk rilis/Play Store,
#    tambahkan keystore (signing) + tugas assembleRelease + signing config.
#  • appId = id.zylora.absensi (lihat android-app/capacitor.config.json).
#  • Build pertama bisa perlu penyesuaian versi (Capacitor 6 butuh Android SDK 34+).
