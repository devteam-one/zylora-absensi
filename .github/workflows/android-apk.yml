name: Build Android APK (Zylora)

# Membungkus frontend Zylora (PWA) jadi APK Android via Capacitor.
# Jalan saat push ke main (otomatis) ATAU manual (Actions → Run workflow).
# Mesin lokal tak punya Android SDK/Gradle modern; build dijalankan di CI ini.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL API Zylora (https://...)"
        required: false
        default: "https://api.13-218-74-178.sslip.io"
      role:
        description: "Frontend yang dibungkus: employee | control"
        required: false
        default: "employee"

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://api.13-218-74-178.sslip.io' }}
  ROLE: ${{ github.event.inputs.role || 'employee' }}

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web (frontend ${{ env.ROLE }})
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm install --no-audit --no-fund react@18.3.1 react-dom@18.3.1
          printf 'VITE_API_URL=%s\n' "$API_URL" > .env.production.local
          VITE_ROLE="$ROLE" npx vite build --outDir "dist-$ROLE" --emptyOutDir

      - name: Wrap with Capacitor
        working-directory: android-app
        run: |
          rm -rf www && mkdir -p www
          cp -r "../dist-$ROLE/." www/
          npm install --no-audit --no-fund
          npx cap add android || true
          npx cap sync android

      - name: Build APK (debug)
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zylora-${{ env.ROLE }}-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

# Catatan: APK *debug* (sideload utk uji). Untuk rilis/Play Store: tambah keystore
# (signing) + assembleRelease. appId = id.zylora.absensi (capacitor.config.json).
